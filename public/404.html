<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var redirectTo =
          window.location.pathname +
          window.location.search +
          window.location.hash;
        sessionStorage.setItem("spa-redirect", redirectTo);
        window.location.replace("/");
      })();
    </script>
  </head>
  <body></body>
</html>
